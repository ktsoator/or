name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@2025.1.1 ./...

      - name: Check README Go version
        run: |
          mod=$(grep -E '^go [0-9]' go.mod | awk '{print $2}' | cut -d. -f1,2)
          grep -qF "Go $mod or later" README.md || {
            echo "README 'Go X or later' is out of sync with go.mod ($mod)"
            exit 1
          }

  test:
    name: Test (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: go.mod
            go-version-file: go.mod
          - label: stable
            go-version: stable

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go-version }}
          go-version-file: ${{ matrix.go-version-file }}
          cache: true

      - name: Test
        run: go test ./...

  race:
    name: Race test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: Test with race detector
        run: go test -race ./...
