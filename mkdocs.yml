          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            LLM: LLM
            Basics: 入门
            Core: 核心
            Advanced: 进阶
            Guides: 使用指南
            Common tasks: 常见任务
            Operations: 配置与运维
            API and concepts: API 与概念
            Operations and extension: 运维与扩展
            Overview: 概述
            Capabilities: 功能总览
            Getting started: 快速开始
            Developer guide: 开发者指南
            Protocol and provider status: 协议与提供方状态
            Examples: 示例
            Models and providers: 模型与提供方
            Clients and registries: Client 与注册表
            API reference: API 索引
            Basic completion: 单次文本生成
            Streaming responses: 流式响应
            Sending images: 发送图片
            Requesting reasoning: 请求推理内容
            Executing tool calls: 执行工具调用
            Changing models in a conversation: 对话中更换模型
            Saving and restoring conversations: 保存与恢复对话
            Finding models and checking credentials: 查找模型与检查凭证
            Connecting a custom model service: 接入自定义模型服务
            Creating a custom client: 创建自定义 Client
            Recording and rewriting requests: 记录和修改请求
            Handling request failures: 处理请求失败
            Testing with a local mock server: 使用本地模拟服务测试
            Streaming events: 流式事件
            Tool definitions and calls: 工具定义与调用
            Reasoning options: 推理配置
            Responses and usage: 响应与用量
            Failure signals: 失败信号
            Messages and context: 消息与上下文
            Request options: 请求选项
            Troubleshooting: 问题排查
            Testing strategy: 测试策略
            Custom protocols: 自定义协议
            Agent: Agent
            Events and state: 事件与状态
            Steering and follow-ups: 引导与追加
            Lifecycle hooks: 生命周期钩子
            Messages and custom types: 消息与自定义类型
