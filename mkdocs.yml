site_name: or
site_description: A modular Go toolkit for building applications with language models and higher-level agents.
site_url: https://ktsoator.github.io/or/
repo_url: https://github.com/ktsoator/or
repo_name: ktsoator/or
copyright: Copyright &copy; ktsoator

docs_dir: docs

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            LLM: LLM
            Overview: 概述
            Getting started: 快速开始
            Providers and models: 提供方与模型
            Streaming: 流式
            Tools: 工具
            Reasoning: 推理
            Conversations: 对话
            Configuration: 配置
            Custom protocols: 自定义协议
            Agent: Agent

theme:
  name: material
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    logo: material/infinity
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: index.md
  - LLM:
      - Overview: llm/README.md
      - Getting started: llm/getting-started.md
      - Providers and models: llm/providers.md
      - Streaming: llm/streaming.md
      - Tools: llm/tools.md
      - Reasoning: llm/reasoning.md
      - Conversations: llm/conversations.md
      - Configuration: llm/configuration.md
      - Custom protocols: llm/extending.md
  - Agent:
      - Overview: agent/README.md
