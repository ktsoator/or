site_name: or
site_description: A modular Go toolkit for building applications with language models and higher-level agents.
site_url: https://ktsoator.github.io/or/
repo_url: https://github.com/ktsoator/or
repo_name: ktsoator/or
copyright: Copyright &copy; ktsoator

docs_dir: docs

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            LLM: LLM
            Basics: 入门
            Core: 核心
            Advanced: 进阶
            Recipes: 场景示例
            Application flows: 应用流程
            Operations: 配置与运维
            Overview: 概述
            Capabilities: 功能总览
            Getting started: 快速开始
            Developer guide: 开发者指南
            Protocol support: 协议支持
            Examples: 示例
            Providers and models: 提供方与模型
            Clients and registries: Client 与注册表
            API reference: API 索引
            Basic completion: 基础补全
            Streaming chat: 流式对话
            Image input: 图片输入
            Reasoning output: 推理输出
            Tool loop: 工具循环
            Model switching: 模型切换
            Conversation persistence: 对话持久化
            Model and auth discovery: 模型与鉴权发现
            Custom gateway: 自定义网关
            Explicit client: 显式 Client
            Observability hooks: 可观测性 Hook
            Mock-provider testing: Mock Provider 测试
            Streaming: 流式响应
            Tools: 工具
            Reasoning: 推理与思考
            Reading responses: 读取响应
            Error handling: 错误处理
            Troubleshooting: 排障
            Testing: 测试
            Conversations: 对话
            Configuration: 请求配置
            Custom protocols: 自定义协议
            Agent: Agent
            Events and state: 事件与状态
            Steering and follow-ups: 引导与追加
            Lifecycle hooks: 生命周期钩子
            Messages and custom types: 消息与自定义类型
            The run-loop engine: 运行循环引擎
            Internals: 源码解析
            Foundations: 基础概念
            Execution: 运行机制
            Architecture overview: 架构总览
            Models and protocols: 模型与协议
            Message types: 消息类型系统
            Protocol adapters: 协议适配器
            Streaming internals: 流式机制
            Switching models: 模型切换
            Notes: 笔记

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

